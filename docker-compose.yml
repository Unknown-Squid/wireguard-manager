version: "3.9"

services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Manila
      - SERVERURL=YOUR_PUBLIC_IP_OR_DOMAIN
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=1.1.1.1
    volumes:
      - ./config:/config
    ports:
      - "51820:51820/udp"
    restart: unless-stopped

  app:
    build: .
    container_name: wireguard-api
    working_dir: /app
    volumes:
      - .:/app
    command: npx ts-node src/server.ts
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Manila
    restart: unless-stopped